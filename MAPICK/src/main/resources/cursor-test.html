<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>실시간 커서 테스트</title>
    <style>
        .cursor {
            position: absolute;
            pointer-events: none;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 12px;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const nickname = prompt("닉네임을 입력하세요") || '사용자';
    const userId = Math.floor(Math.random() * 100000); // 임시 ID

    const socket = new SockJS("http://localhost:8080/ws");
    const client = Stomp.over(socket);

    const cursors = new Map(); // userId -> DOM element

    client.connect({}, () => {
        console.log("✅ 연결 완료");

        // 구독: 서버가 전파한 커서 메시지 받기
        client.subscribe("/topic/roadmap/128/cursor", (message) => {
            const data = JSON.parse(message.body);
            showCursor(data);
        });

        // 커서 이동 시 메시지 전송
        document.addEventListener("mousemove", (e) => {
            const payload = {
                userId: userId,
                nickname: nickname,
                x: e.clientX,
                y: e.clientY
            };

            client.send("/app/roadmap/128/cursor", {}, JSON.stringify(payload));
        });
    });

    function showCursor(data) {
        let el = cursors.get(data.userId);
        if (!el) {
            el = document.createElement("div");
            el.className = "cursor";
            el.innerText = data.nickname;
            document.body.appendChild(el);
            cursors.set(data.userId, el);
        }
        el.style.left = data.x + "px";
        el.style.top = data.y + "px";
    }
</script>
</body>
</html>
